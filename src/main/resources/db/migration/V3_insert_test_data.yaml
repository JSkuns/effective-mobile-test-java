databaseChangeLog:
  - changeSet:
      id: "3-insert-test-users"
      author: "tehni"
      comment: "–Т—Б—В–∞–≤–Ї–∞ —В–µ—Б—В–Њ–≤—Л—Е –њ–Њ–ї—М–Ј–Њ–≤–∞—В–µ–ї–µ–є (admin –Є user1) —Б –Ј–∞—Й–Є—В–Њ–є –Њ—В –і—Г–±–ї–µ–є"
      changes:
        # –Ш—Б–њ–Њ–ї—М–Ј—Г–µ–Љ raw SQL, —В–∞–Ї –Ї–∞–Ї ON CONFLICT DO NOTHING —Б–њ–µ—Ж–Є—Д–Є—З–µ–љ –і–ї—П PostgreSQL
        - sql:
            dbms: postgresql
            stripComments: false
            splitStatements: true
            sql: |
              INSERT INTO users (username, password, role)
              VALUES ('admin', '$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy', 'ADMIN')
              ON CONFLICT (username) DO NOTHING;

              INSERT INTO users (username, password, role)
              VALUES ('user1', '$2a$10$N9qo8uLOickgx2ZMRZoMyeIjZAgcfl7p92ldGxad68LJZdL17lhWy', 'USER')
              ON CONFLICT (username) DO NOTHING;

      # –С–µ–Ј–Њ–њ–∞—Б–љ—Л–є –Њ—В–Ї–∞—В: —Г–і–∞–ї—П–µ—В —В–Њ–ї—М–Ї–Њ —В–µ—Б—В–Њ–≤—Л–µ –Ј–∞–њ–Є—Б–Є, –µ—Б–ї–Є –Љ–Є–≥—А–∞—Ж–Є—О –љ—Г–ґ–љ–Њ –Њ—В–Љ–µ–љ–Є—В—М
      rollback:
        - sql:
            dbms: postgresql
            sql: |
              DELETE FROM users WHERE username IN ('admin', 'user1');