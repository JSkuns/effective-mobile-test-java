databaseChangeLog:
  - changeSet:
      id: "1-create-users-table"
      author: "test"
      comment: "Создание таблицы пользователей, комментариев, функции и триггера"
      changes:
        # 1. Создание таблицы
        - createTable:
            tableName: "users"
            columns:
              - column:
                  name: "id"
                  type: "BIGINT"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: "username"
                  type: "VARCHAR(50)"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: "password"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "role"
                  type: "VARCHAR(20)"
                  defaultValue: "USER"
                  constraints:
                    nullable: false
              - column:
                  name: "created_at"
                  type: "TIMESTAMP WITH TIME ZONE"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: "updated_at"
                  type: "TIMESTAMP WITH TIME ZONE"
                  defaultValueComputed: "CURRENT_TIMESTAMP"

        # 2. Добавление комментариев (Table & Columns)
        - comment:
            tableName: "users"
            comment: "Таблица пользователей системы управления банковскими картами"
        - comment:
            tableName: "users"
            columnNames: "id"
            comment: "Уникальный идентификатор пользователя"
        - comment:
            tableName: "users"
            columnNames: "username"
            comment: "Логин пользователя (уникальный)"
        - comment:
            tableName: "users"
            columnNames: "password"
            comment: "Хэш пароля (BCrypt)"
        - comment:
            tableName: "users"
            columnNames: "role"
            comment: "Роль пользователя: USER или ADMIN"
        - comment:
            tableName: "users"
            columnNames: "created_at"
            comment: "Дата создания записи"
        - comment:
            tableName: "users"
            columnNames: "updated_at"
            comment: "Дата последнего обновления записи"

        # 3. Создание функции и триггера (через чистый SQL, так как это PL/pgSQL)
        - sql:
            dbms: postgresql
            stripComments: false
            splitStatements: true
            sql: |
              CREATE OR REPLACE FUNCTION update_modified_column()
              RETURNS TRIGGER AS $$
              BEGIN
                  NEW.updated_at = CURRENT_TIMESTAMP;
                  RETURN NEW;
              END;
              $$ language 'plpgsql';

              CREATE TRIGGER update_users_modtime
              BEFORE UPDATE ON users
              FOR EACH ROW EXECUTE PROCEDURE update_modified_column();