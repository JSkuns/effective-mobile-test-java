databaseChangeLog:
  - changeSet:
      id: "2-create-cards-table"
      author: "test"
      comment: "Создание таблицы банковских карт, ограничений, комментариев и триггера обновления"
      changes:
        # 1. Создание таблицы
        - createTable:
            tableName: "cards"
            columns:
              - column:
                  name: "id"
                  type: "BIGINT"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: "card_number_encrypted"
                  type: "TEXT"
                  constraints:
                    nullable: false
              - column:
                  name: "owner_id"
                  type: "BIGINT"
                  constraints:
                    nullable: false
                    foreignKeyName: "fk_cards_owner"
                    references: "users(id)"
                    deleteCascade: true
              - column:
                  name: "balance"
                  type: "DECIMAL(15, 2)"
                  defaultValueNumeric: "0.00"
                  constraints:
                    nullable: false
              - column:
                  name: "status"
                  type: "VARCHAR(20)"
                  defaultValue: "ACTIVE"
                  constraints:
                    nullable: false
              - column:
                  name: "expiry_date"
                  type: "DATE"
              - column:
                  name: "created_at"
                  type: "TIMESTAMP WITH TIME ZONE"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: "updated_at"
                  type: "TIMESTAMP WITH TIME ZONE"
                  defaultValueComputed: "CURRENT_TIMESTAMP"

        # 2. CHECK-ограничения
        - addConstraint:
            tableName: "cards"
            constraintName: "chk_balance_positive"
            checkConstraint: "balance >= 0"

        - addConstraint:
            tableName: "cards"
            constraintName: "chk_status_valid"
            checkConstraint: "status IN ('ACTIVE', 'BLOCKED', 'EXPIRED')"

        # 3. Комментарии к таблице и колонкам
        - comment:
            tableName: "cards"
            comment: "Таблица банковских карт"
        - comment:
            tableName: "cards"
            columnNames: "id"
            comment: "Уникальный идентификатор карты"
        - comment:
            tableName: "cards"
            columnNames: "card_number_encrypted"
            comment: "Зашифрованный номер карты (AES-256)"
        - comment:
            tableName: "cards"
            columnNames: "owner_id"
            comment: "ID владельца карты (внешний ключ на users.id)"
        - comment:
            tableName: "cards"
            columnNames: "balance"
            comment: "Текущий баланс карты"
        - comment:
            tableName: "cards"
            columnNames: "status"
            comment: "Статус карты: ACTIVE, BLOCKED, EXPIRED"
        - comment:
            tableName: "cards"
            columnNames: "expiry_date"
            comment: "Срок действия карты (год-месяц)"
        - comment:
            tableName: "cards"
            columnNames: "created_at"
            comment: "Дата создания карты"
        - comment:
            tableName: "cards"
            columnNames: "updated_at"
            comment: "Дата последнего обновления карты"

        # 4. Триггер для updated_at
        # Зависит от функции update_modified_column(), созданной в миграции V1
        - sql:
            dbms: postgresql
            stripComments: false
            splitStatements: true
            sql: |
              CREATE TRIGGER update_cards_modtime
              BEFORE UPDATE ON cards
              FOR EACH ROW EXECUTE PROCEDURE update_modified_column();