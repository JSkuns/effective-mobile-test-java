databaseChangeLog:
  - changeSet:
      id: "1-create-users-table"
      author: "VVTerekhin"
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: "users"
      changes:
        - createTable:
            tableName: "users"
            columns:
              - column:
                  name: "id"
                  type: "BIGINT"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: "username"
                  type: "VARCHAR(50)"
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: "password"
                  type: "VARCHAR(255)"
                  constraints:
                    nullable: false
              - column:
                  name: "role"
                  type: "VARCHAR(20)"
                  defaultValue: "USER"
                  constraints:
                    nullable: false
              - column:
                  name: "created_at"
                  type: "TIMESTAMP WITH TIME ZONE"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: "updated_at"
                  type: "TIMESTAMP WITH TIME ZONE"
                  defaultValueComputed: "CURRENT_TIMESTAMP"