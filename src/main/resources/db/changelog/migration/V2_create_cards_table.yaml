databaseChangeLog:
  - changeSet:
      id: "2-create-cards-table"
      author: "VVTerekhin"
      preConditions:
        - onFail: MARK_RAN
          not:
            tableExists:
              tableName: "cards"
      changes:
        - createTable:
            tableName: "cards"
            columns:
              - column:
                  name: "id"
                  type: "BIGINT"
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: "card_number_encrypted"
                  type: "TEXT"
                  constraints:
                    nullable: false
              - column:
                  name: "owner_id"
                  type: "BIGINT"
                  constraints:
                    nullable: false
                    foreignKeyName: "fk_cards_owner"
                    references: "users(id)"
                    deleteCascade: true
              - column:
                  name: "balance"
                  type: "DECIMAL(15, 2)"
                  defaultValueNumeric: "0.00"
                  constraints:
                    nullable: false
              - column:
                  name: "status"
                  type: "VARCHAR(20)"
                  defaultValue: "ACTIVE"
                  constraints:
                    nullable: false
              - column:
                  name: "expiry_date"
                  type: "DATE"
              - column:
                  name: "created_at"
                  type: "TIMESTAMP WITH TIME ZONE"
                  defaultValueComputed: "CURRENT_TIMESTAMP"
              - column:
                  name: "updated_at"
                  type: "TIMESTAMP WITH TIME ZONE"
                  defaultValueComputed: "CURRENT_TIMESTAMP"